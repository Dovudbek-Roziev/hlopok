<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <title>Хлопок | Панель управления</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { height: 100%; }
      body {
        height: 100%;
        background: #F4F6F9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
      }
      #root { height: 100%; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D8D8D8; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #ABABAB; }

      /* Hide scroll */
      .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
      .hide-scroll::-webkit-scrollbar { display: none; }

      /* Spin */
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 0.8s linear infinite; }

      /* Table row hover */
      .tr-hover { transition: background 0.12s; }
      .tr-hover:hover { background: #F6FCF8 !important; }
      .tr-clickable { cursor: pointer; }

      /* Card hover */
      .card-hover { transition: box-shadow 0.18s, transform 0.18s; }
      .card-hover:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10) !important; transform: translateY(-1px); }

      /* Nav item hover */
      .nav-item:hover { background-color: #F0F0F0 !important; }
      .nav-active:hover { background-color: #DDF2E8 !important; }

      /* Input focus */
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #2D8653 !important;
        box-shadow: 0 0 0 3px rgba(45,134,83,0.12);
      }

      /* Button base */
      button { font-family: inherit; }

      /* Smooth transitions */
      a { transition: color 0.15s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
